<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📁 Panel de Archivos — WhatsApp Bot</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0a0a14;
            --accent: #00d2ff;
            --accent-secondary: #7b2ff7;
            --accent-gradient: linear-gradient(135deg, #00d2ff, #7b2ff7);
            --text-primary: #e8e8f0;
            --text-secondary: #8888aa;
            --danger: #ff4757;
            --success: #2ed573;
            --border: rgba(255,255,255,0.06);
            --glass: rgba(255,255,255,0.03);
            --radius: 16px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* ── Login Screen ── */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,210,255,0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(123,47,247,0.08) 0%, transparent 50%),
                        var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 80px rgba(0,0,0,0.5);
        }

        .login-card h1 {
            font-size: 28px;
            font-weight: 700;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .login-card p {
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,210,255,0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: #fff;
            width: 100%;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(0,210,255,0.3);
        }

        .btn-danger {
            background: rgba(255,71,87,0.15);
            color: var(--danger);
            padding: 8px 16px;
            font-size: 13px;
        }

        .btn-danger:hover {
            background: rgba(255,71,87,0.3);
        }

        /* ── Dashboard ── */
        #dashboard {
            display: none;
            min-height: 100vh;
            background: radial-gradient(ellipse at 20% 10%, rgba(0,210,255,0.05) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 90%, rgba(123,47,247,0.05) 0%, transparent 50%),
                        var(--bg-primary);
        }

        .header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(15,15,26,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .header h1 span {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-logout {
            background: var(--bg-card);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 10px 20px;
            font-size: 13px;
        }

        .btn-logout:hover {
            color: var(--danger);
            border-color: var(--danger);
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── Upload Card ── */
        .upload-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 32px;
        }

        .upload-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .upload-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .drop-zone {
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent);
            background: rgba(0,210,255,0.05);
        }

        .drop-zone .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .drop-zone .label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .drop-zone .file-name {
            color: var(--accent);
            font-weight: 500;
            margin-top: 8px;
            font-size: 14px;
        }

        /* ── Files Table ── */
        .files-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .files-card h2 {
            font-size: 18px;
            font-weight: 600;
            padding: 24px 32px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .files-table {
            width: 100%;
            border-collapse: collapse;
        }

        .files-table th {
            text-align: left;
            padding: 12px 24px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
            background: var(--glass);
        }

        .files-table td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .files-table tr:last-child td {
            border-bottom: none;
        }

        .files-table tr:hover td {
            background: var(--glass);
        }

        .file-name-cell {
            font-weight: 600;
            color: var(--accent);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-global {
            background: rgba(0,210,255,0.15);
            color: var(--accent);
        }

        .badge-group {
            background: rgba(123,47,247,0.15);
            color: #b388ff;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            background: rgba(46,213,115,0.2);
            border: 1px solid var(--success);
            color: var(--success);
        }

        .toast-error {
            background: rgba(255,71,87,0.2);
            border: 1px solid var(--danger);
            color: var(--danger);
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 640px) {
            .upload-row { grid-template-columns: 1fr; }
            .header { padding: 16px 20px; }
            .container { padding: 20px 16px; }
            .files-table th, .files-table td { padding: 12px 16px; }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="login-screen">
        <div class="login-card">
            <h1>📁 Panel de Archivos</h1>
            <p>WhatsApp Bot — Administración de archivos compartidos</p>
            <form id="login-form">
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" id="login-user" placeholder="admin" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-pass" placeholder="••••••••" autocomplete="current-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard">
        <div class="header">
            <h1>📁 <span>Panel de Archivos</span></h1>
            <button class="btn btn-logout" onclick="logout()">Cerrar Sesión</button>
        </div>

        <div class="container">
            <!-- Upload Card -->
            <div class="upload-card">
                <h2>⬆️ Subir Archivo</h2>
                <div class="drop-zone" id="drop-zone">
                    <div class="icon">📎</div>
                    <div class="label">Arrastra un archivo aquí o haz clic para seleccionar</div>
                    <div class="file-name" id="selected-file-name"></div>
                    <input type="file" id="file-input" style="display: none;">
                </div>
                <div class="upload-row">
                    <div class="form-group">
                        <label>Nombre del archivo (comando)</label>
                        <input type="text" id="file-name" placeholder="ej: vpn_config">
                    </div>
                    <div class="form-group">
                        <label>Grupo (JID o global)</label>
                        <input type="text" id="file-group" placeholder="global" value="global">
                    </div>
                </div>
                <button class="btn btn-primary" id="upload-btn" onclick="uploadFile()">
                    ⬆️ Subir Archivo
                </button>
            </div>

            <!-- Files List -->
            <div class="files-card">
                <h2>📂 Archivos Compartidos</h2>
                <div id="files-container">
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <div>Cargando archivos...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let authToken = localStorage.getItem('panel_token') || '';

        // Auto-login if token exists
        if (authToken) {
            showDashboard();
            loadFiles();
        }

        // ── Login ────────────────────────────────────────────────
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('login-user').value;
            const pass = document.getElementById('login-pass').value;

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user, pass }),
                });

                const data = await res.json();
                if (res.ok) {
                    authToken = data.token;
                    localStorage.setItem('panel_token', authToken);
                    showDashboard();
                    loadFiles();
                } else {
                    showToast(data.error || 'Error de login', 'error');
                }
            } catch (err) {
                showToast('Error de conexión', 'error');
            }
        });

        function showDashboard() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function logout() {
            authToken = '';
            localStorage.removeItem('panel_token');
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('dashboard').style.display = 'none';
        }

        // ── Drag & Drop ──────────────────────────────────────────
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName();
            }
        });

        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            const name = fileInput.files[0]?.name;
            const el = document.getElementById('selected-file-name');
            if (name) {
                el.textContent = `📄 ${name}`;
                // Auto-fill the name input if empty
                const nameInput = document.getElementById('file-name');
                if (!nameInput.value) {
                    nameInput.value = name.split('.')[0].replace(/[^a-zA-Z0-9_-]/g, '_').toLowerCase();
                }
            } else {
                el.textContent = '';
            }
        }

        // ── Upload ───────────────────────────────────────────────
        async function uploadFile() {
            const file = fileInput.files[0];
            if (!file) {
                showToast('Selecciona un archivo primero', 'error');
                return;
            }

            const name = document.getElementById('file-name').value;
            if (!name) {
                showToast('Escribe un nombre para el archivo', 'error');
                return;
            }

            const btn = document.getElementById('upload-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Subiendo...';

            const formData = new FormData();
            formData.append('file', file);
            formData.append('name', name);
            formData.append('group_jid', document.getElementById('file-group').value || 'global');

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: { 'X-Auth-Token': authToken },
                    body: formData,
                });

                const data = await res.json();
                if (res.ok) {
                    showToast(`✅ Archivo "${name}" subido exitosamente`, 'success');
                    fileInput.value = '';
                    document.getElementById('selected-file-name').textContent = '';
                    document.getElementById('file-name').value = '';
                    loadFiles();
                } else {
                    if (res.status === 401) { logout(); return; }
                    showToast(data.error || 'Error al subir', 'error');
                }
            } catch (err) {
                showToast('Error de conexión', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⬆️ Subir Archivo';
            }
        }

        // ── Load Files ───────────────────────────────────────────
        async function loadFiles() {
            try {
                const res = await fetch('/api/files', {
                    headers: { 'X-Auth-Token': authToken },
                });

                if (res.status === 401) { logout(); return; }
                const data = await res.json();
                renderFiles(data.files || []);
            } catch {
                document.getElementById('files-container').innerHTML =
                    '<div class="empty-state"><div class="icon">❌</div><div>Error al cargar archivos</div></div>';
            }
        }

        function renderFiles(files) {
            const container = document.getElementById('files-container');

            if (files.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>No hay archivos compartidos</div></div>';
                return;
            }

            let html = `<table class="files-table">
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Archivo</th>
                        <th>Tamaño</th>
                        <th>Grupo</th>
                        <th>Fecha</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>`;

            for (const f of files) {
                const size = f.size > 1024 * 1024
                    ? (f.size / (1024 * 1024)).toFixed(1) + ' MB'
                    : Math.round(f.size / 1024) + ' KB';

                const groupLabel = f.group_jid === 'global'
                    ? '<span class="badge badge-global">Global</span>'
                    : '<span class="badge badge-group">Grupo</span>';

                const date = new Date(f.created_at).toLocaleDateString('es', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });

                html += `<tr>
                    <td class="file-name-cell">!archivo ${f.name}</td>
                    <td>${f.original_name}</td>
                    <td>${size}</td>
                    <td>${groupLabel}</td>
                    <td style="color:var(--text-secondary)">${date}</td>
                    <td><button class="btn btn-danger" onclick="deleteFile(${f.id})">🗑️ Eliminar</button></td>
                </tr>`;
            }

            html += '</tbody></table>';
            container.innerHTML = html;
        }

        // ── Delete ───────────────────────────────────────────────
        async function deleteFile(id) {
            if (!confirm('¿Seguro que quieres eliminar este archivo?')) return;

            try {
                const res = await fetch(`/api/files/${id}`, {
                    method: 'DELETE',
                    headers: { 'X-Auth-Token': authToken },
                });

                if (res.status === 401) { logout(); return; }
                if (res.ok) {
                    showToast('🗑️ Archivo eliminado', 'success');
                    loadFiles();
                } else {
                    const data = await res.json();
                    showToast(data.error || 'Error al eliminar', 'error');
                }
            } catch {
                showToast('Error de conexión', 'error');
            }
        }

        // ── Toast ────────────────────────────────────────────────
        function showToast(msg, type = 'success') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = `toast toast-${type} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
